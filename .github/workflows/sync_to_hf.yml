name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Add HF Space metadata to README
        run: |
          {
            printf -- '---\n'
            printf 'title: SMS Spam Detector\n'
            printf 'emoji: 📲\n'
            printf 'colorFrom: green\n'
            printf 'colorTo: yellow\n'
            printf 'sdk: docker\n'
            printf 'app_port: 7860\n'
            printf 'pinned: false\n'
            printf 'short_description: Streamlit app for SMS spam detection using Deep Learning.\n'
            printf -- '---\n\n'
            cat README.md
          } > README_HF.md && mv README_HF.md README.md

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.24"

      - name: Sync to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="cnoret/sms-spam-detector",
              repo_type="space",
              commit_message="Sync from GitHub",
              ignore_patterns=[
                  ".git",
                  ".github",
                  ".gitignore",
                  ".gitattributes",
                  "img/",
                  "models/",
                  "data/",
                  "notebook/",
              ],
          )
          EOF
